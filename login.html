<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Conexión Segura</title>
    <style>
        /* Mismos estilos y paleta de colores psicológica para transmitir calma y seguridad */
        :root {
            --bg-color: #f4f7f6;      /* Gris verdoso muy claro y relajante */
            --card-bg: #ffffff;       /* Blanco puro para los contenedores */
            --primary: #2d6a4f;       /* Verde mate profundo para elementos principales */
            --secondary: #40916c;     /* Verde medio para interacciones y botones */
            --text-main: #1b4332;     /* Texto oscuro pero suave */
            --text-muted: #52b788;    /* Verde claro para detalles y textos secundarios */
            --border-color: #d8f3dc;  /* Bordes suaves */
            --accent-blue: #4a90e2;   /* Azul mate para notas informativas */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .container {
            max-width: 450px; /* Un poco más estrecho para formularios */
            margin: 50px auto;
            padding: 0 15px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        /* Mecánica de pestañas para cambiar entre Login y Registro */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            margin-bottom: -2px;
        }

        /* Estilos de los Formularios */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
        }

        /* Botón Principal */
        .submit-btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--secondary);
        }

        /* Recordatorio de Privacidad / Ética */
        .info-notice {
            background-color: #e8f4fd;
            border: 1px solid var(--accent-blue);
            color: #1d4ed8;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 25px;
            line-height: 1.4;
        }

        /* Control de visibilidad de los formularios */
        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h1>NEXUS</h1>
        <div>
            <span style="font-size: 0.9rem; font-weight: 500; color: var(--primary);">Espacio Seguro</span>
        </div>
    </header>

    <div class="container">
        
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" onclick="switchTab('register')">Crear Cuenta</button>
            </div>

            <div id="login-form" class="form-content active">
                <form onsubmit="simularAcceso(event, 'inicio')">
                    <div class="form-group">
                        <label for="login-email">Correo Electrónico</label>
                        <input type="email" id="login-email" required placeholder="tu@correo.com">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="submit-btn">Entrar al Espacio</button>
                </form>
                
                <div class="info-notice">
                    <strong>Conexión consciente:</strong> Al ingresar, te comprometes a interactuar desde el respeto y la empatía con el resto de la comunidad.
                </div>
            </div>

            <div id="register-form" class="form-content">
                <form onsubmit="simularAcceso(event, 'registro')">
                    <div class="form-group">
                        <label for="reg-user">Nombre de Usuario</label>
                        <input type="text" id="reg-user" required placeholder="ej. @sofia_arte">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Correo Electrónico</label>
                        <input type="email" id="reg-email" required placeholder="tu@correo.com">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Contraseña Segura</label>
                        <input type="password" id="reg-password" required placeholder="Mínimo 8 caracteres">
                    </div>
                    <button type="submit" class="submit-btn">Comenzar en Nexus</button>
                </form>

                <div class="info-notice">
                    <strong>Principio de Privacidad:</strong> Tus datos no serán vendidos ni utilizados para crear perfiles publicitarios manipulativos. Diseñamos para tu bienestar mental.
                </div>
            </div>

        </div>

    </div>

    <script>
        // Función para alternar de forma limpia entre pestañas
        function switchTab(tab) {
            // Remover estado activo de botones y formularios
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-content').forEach(form => form.classList.remove('active'));

            // Activar la opción seleccionada
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        // Simulación interactiva de envío de formularios
        function simularAcceso(event, tipo) {
            event.preventDefault();
            if (tipo === 'inicio') {
                alert('¡Bienvenido de vuelta a Nexus! Redireccionando a tu entorno seguro...');
            } else {
                alert('¡Cuenta creada con éxito! Gracias por unirte a una red social más humana.');
            }
        }
    </script>
</body>
</html>
