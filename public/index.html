<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus</title>
    
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2d6a4f;
            --secondary: #40916c;
            --text-main: #1b4332;
            --text-muted: #52b788;
            --border-color: #d8f3dc;
            --accent-blue: #4a90e2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 1px;
            cursor: pointer;
        }

        .nav-links {
            display: none;
            gap: 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--border-color);
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 25px; }
        .tab-btn { flex: 1; background: none; border: none; padding: 12px; font-size: 1rem; font-weight: 600; color: var(--text-muted); cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; color: var(--primary); margin-bottom: 5px; }
        .form-group input, .post-input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-color); color: var(--text-main); font-size: 1rem; }
        .submit-btn { width: 100%; background-color: var(--primary); color: white; border: none; padding: 12px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        /* POSTS */
        .post-creator-box { display: flex; gap: 10px; align-items: flex-end; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .username { font-weight: bold; color: var(--primary); }
        .post-content { font-size: 1.05rem; margin-bottom: 15px; }
        .values-tags { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tag { background-color: var(--border-color); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; }
        .actions-bar { display: flex; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .action-btn { flex: 1; background: none; border: none; color: var(--secondary); font-size: 0.95rem; font-weight: 600; cursor: pointer; padding: 8px; border-radius: 6px; text-align: center; }
        .action-btn:hover { background-color: var(--bg-color); }
    </style>
</head>
<body>

    <header>
        <h1 onclick="navigateTo('home')">NEXUS</h1>
        <div class="nav-links" id="nav-menu">
            <button class="nav-btn active" id="nav-home" onclick="navigateTo('home')">🏠 Inicio</button>
            <button class="nav-btn" id="nav-search" onclick="navigateTo('search')">🔍 Buscar</button>
            <button class="nav-btn" id="nav-profile" onclick="navigateTo('profile')">👤 Perfil</button>
            <button class="nav-btn" style="color: #c91818;" onclick="logout()">🚫 Salir</button>
        </div>
        <div id="safe-badge"><span style="font-size: 0.9rem; font-weight: 500; color: var(--primary);">Espacio Seguro</span></div>
    </header>

    <div class="container">

        <div id="view-auth" class="view-section active">
            <div class="card" style="max-width: 450px; margin: 0 auto;">
                <div class="tabs"><button class="tab-btn" style="color: var(--primary); border-bottom: 3px solid var(--primary);">Acceder a la Beta</button></div>
                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label>Elige tu Nombre de Usuario</label>
                        <input type="text" id="auth-user" required placeholder="ej. @sofia_arte">
                    </div>
                    <button type="submit" class="submit-btn">Entrar a la Comunidad</button>
                </form>
            </div>
        </div>

        <div id="view-home" class="view-section">
            <div class="card">
                <form onsubmit="createPost(event)" class="post-creator-box">
                    <div style="width: 40px; height: 40px; background: var(--secondary); border-radius: 50%;"></div>
                    <input type="text" id="new-post-text" class="post-input" required placeholder="¿Qué reflexión consciente tienes hoy?">
                    <button type="submit" class="submit-btn" style="width: auto; margin: 0; padding: 12px 20px;">Publicar</button>
                </form>
            </div>
            <div id="feed-container">Conectando con el universo de Nexus...</div>
        </div>

        <div id="view-search" class="view-section">
            <div class="card">
                <input type="text" id="search-input" class="post-input" placeholder="Buscar por palabra clave..." oninput="filterPosts()">
            </div>
            <div id="search-results"></div>
        </div>

        <div id="view-profile" class="view-section">
            <div class="card" style="text-align: center;">
                <div style="width:70px; height:70px; background:var(--secondary); border-radius:50%; margin:0 auto 10px;"></div>
                <h2 id="profile-display-username">@KevinAndres</h2>
                <p>Miembro fundador de la Beta de Nexus.</p>
            </div>
            <div id="profile-posts-container"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, increment, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURACIÓN DE TU PROYECTO (Copia esto desde tu consola de Firebase)
        const firebaseConfig = {
          apiKey: "AIzaSyAevve9w-gBHcX53v22enbwvgovis-CA3o",
          authDomain: "nexus-app-877e1.firebaseapp.com",
          projectId: "nexus-app-877e1",
          storageBucket: "nexus-app-877e1.firebasestorage.app",
          messagingSenderId: "665380339194",
          appId: "1:665380339194:web:9b5e292e04c2e355e5f843",
          measurementId: "G-6HLVHNBZHN"
        };

        // Inicializar servicios
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Variables globales de estado
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let allPosts = [];

        // Exponer funciones globales que el HTML necesita ejecutar mediante los onclick
        window.navigateTo = navigateTo;
        window.handleAuth = handleAuth;
        window.createPost = createPost;
        window.addValue = addValue;
        window.filterPosts = filterPosts;
        window.logout = logout;

        // Comprobación de arranque
        if (currentUser) loginSuccess();
        else navigateTo('auth');

        function navigateTo(view) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            if (view !== 'auth') document.getElementById(`nav-${view}`).classList.add('active');

            if (view === 'home') loadFeed();
            if (view === 'profile') loadProfile();
        }

        function handleAuth(e) {
            e.preventDefault();
            let user = document.getElementById('auth-user').value;
            currentUser = { username: user.startsWith('@') ? user : '@' + user };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            loginSuccess();
        }

        function loginSuccess() {
            document.getElementById('nav-menu').style.display = 'flex';
            document.getElementById('safe-badge').style.display = 'none';
            navigateTo('home');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.reload();
        }

        // LEER DE FIREBASE (Para todos los usuarios 24/7)
        async function loadFeed() {
            const container = document.getElementById('feed-container');
            
            try {
                // Hacemos una query ordenada por la fecha de creación descending
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                allPosts = [];
                querySnapshot.forEach((doc) => {
                    allPosts.push({ id: doc.id, ...doc.data() });
                });

                container.innerHTML = '';
                if(allPosts.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:gray;">No hay reflexiones compartidas aún. ¡Sé el primero!</p>';
                    return;
                }

                allPosts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="post-header"><span class="username">${post.user}</span></div>
                        <div class="post-content">${post.text}</div>
                        <div class="values-tags">
                            <span class="tag">🌱 Aporta</span>
                            <span class="tag" style="background:#ffeeba; color:#856404;">✨ Valoraciones: ${post.values || 0}</span>
                        </div>
                        <div class="actions-bar">
                            <button class="action-btn" onclick="addValue('${post.id}')">🌿 + Reaccionar con Valor</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = "Asegúrate de configurar las reglas públicas en Firestore.";
                console.error(err);
            }
        }

        // GUARDAR EN FIREBASE (En la colección "posts")
        async function createPost(e) {
            e.preventDefault();
            const input = document.getElementById('new-post-text');

            try {
                await addDoc(collection(db, "posts"), {
                    user: currentUser.username,
                    text: input.value,
                    values: 0,
                    createdAt: Date.now() // Guardamos timestamp para ordenar correctamente
                });
                input.value = '';
                loadFeed();
            } catch (err) {
                alert("Error al guardar la publicación.");
            }
        }

        // REACCIONAR / ACTUALIZAR EN FIREBASE
        async function addValue(postId) {
            const postRef = doc(db, "posts", postId);
            // Incrementamos de forma atómica el campo "values" en 1 en la base de datos
            await updateDoc(postRef, {
                values: increment(1)
            });

            loadFeed();
        }

        function filterPosts() {
            const queryText = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('search-results');
            container.innerHTML = '';
            const filtered = allPosts.filter(p => p.text.toLowerCase().includes(queryText));
            filtered.forEach(post => {
                container.innerHTML += `<div class="card"><strong>${post.user}</strong><p>${post.text}</p></div>`;
            });
        }

        function loadProfile() {
            document.getElementById('profile-display-username').innerText = currentUser.username;
            const container = document.getElementById('profile-posts-container');
            container.innerHTML = '';
            const myPosts = allPosts.filter(p => p.user === currentUser.username);
            myPosts.forEach(post => {
                container.innerHTML += `<div class="card"><p>${post.text}</p></div>`;
            });
        }
    </script>
</body>
</html>
